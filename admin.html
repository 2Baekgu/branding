<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Pretendard","맑은 고딕",system-ui,sans-serif}

<script>

  apiKey:"AIzaSyBrhxzp0aPHK6nozgeoiGSVV2qQMzCDRZA",

var QCTX="당신은 이수연 님의 창의성과 브랜딩 기말 발표를 진행하는 AI 발표 도우미입니다. 아래는 발표한 연구의 핵심입니다. 주제는 씨피알 긴급상황에서 행동을 지원하는 음성 안내의 설계 조건이며 정보밀도와 발화속도를 중심으로 합니다. 배경: 일반인 씨피알 시행률은 30퍼센트대이고, 장벽은 지식이 아니라 실수에 대한 두려움 같은 심리적 망설임입니다. 설문 이백한 명에서 중요성 인식은 4.68점, 수행 자신감은 3.01점, 망설임의 가장 큰 이유는 실수에 대한 두려움 43퍼센트였습니다. 실험은 발화속도 330과 400, 정보밀도 높음과 낮음을 교차한 2x2 설계로 조건당 8명 총 32명입니다. 마네킹에 옷을 입히고 뒤에 AI 스피커를 숨겨 대화하게 한 뒤 무작위 시점에 쓰러뜨려 긴박감을 재현했습니다. 결과: 음성 안내는 자신감을 3.47에서 6.03으로 높이고 행동 개시를 촉진했지만, 정보의 양이나 속도 조합으로는 우열이 갈리지 않았고 정확성에 대한 확신은 주지 못했습니다. 진짜 관건은 정보를 행동 단위로 나누고 행동할 시간을 주는 것이었습니다. 제안한 설계 원칙은 단호한 초기 지시, 행동 단위 분절, 지시와 행동의 리듬, 실시간 피드백, 단계별 멀티모달입니다. 창의성 수업과의 연결은 정답은 하나가 아니다, 기능적 고착 깨기와 브리콜라주, 예측을 깨는 놀라움, 디자인은 해체하고 다시 정의하는 일, 그리고 수치가 아니라 신뢰의 문제라는 점입니다.";
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
firebase.initializeApp(FB_CONFIG);var db=firebase.database();
db.ref('.info/connected').on('value',function(s){var e=document.getElementById('stat');e.textContent=s.val()?'● 실시간 연결됨':'● 연결 끊김';e.style.color=s.val()?'#27e0b0':'#ff5f5f';});
var items={};
var _ALLM=null,_RAW=null;function listModels(){if(_ALLM)return Promise.resolve(_ALLM);return fetch('https://generativelanguage.googleapis.com/v1beta/models?key='+GEMINI_KEY).then(function(r){return r.json();}).then(function(j){_RAW=j;_ALLM=(j.models||[]);return _ALLM;});}function pickTextModel(){return listModels().then(function(ms){var gc=ms.filter(function(mm){var n=mm.name||'';return (mm.supportedGenerationMethods||[]).indexOf('generateContent')>=0 && !/tts|embedding|image|vision|aqa/i.test(n);});var pf=gc.filter(function(mm){return /2\.0-flash|2\.5-flash|flash-latest/i.test(mm.name||'');});var pf2=gc.filter(function(mm){return /flash/i.test(mm.name||'');});var ch=pf[0]||pf2[0]||gc[0];if(ch)return ch.name.replace('models/','');var diag=_RAW&&_RAW.error?('API오류: '+_RAW.error.message):('가능모델 '+ms.length+'개: '+ms.map(function(x){return (x.name||'').replace('models/','');}).slice(0,10).join(', '));throw new Error(diag);});}
function callModel(mi,q){return fetch("https://generativelanguage.googleapis.com/v1beta/models/"+MODELS[mi]+":generateContent?key="+GEMINI_KEY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:QCTX+"\n\n청중 질문: "+q+"\n\n위 연구 내용을 근거로, AI 발표 도우미로서 한국어로 두세 문장으로 친절하고 간결하게 답하세요. 모르면 솔직히 모른다고 답하세요."}]}]})}).then(function(r){return r.json();}).then(function(j){if(j.error)throw new Error(j.error.message||'error');var t='';try{t=j.candidates[0].content.parts.map(function(p){return p.text||'';}).join('');}catch(e){t='';}if(!t)throw new Error('빈 응답');return t;});}
function draft(q){return pickTextModel().then(function(model){if(!model)throw new Error('사용 가능한 텍스트 모델 없음');return fetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+GEMINI_KEY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:QCTX+'\n\n청중 질문: '+q+'\n\n위 연구 내용을 근거로, AI 발표 도우미로서 한국어로 두세 문장으로 친절하고 간결하게 답하세요. 모르면 솔직히 모른다고 답하세요.'}]}]})}).then(function(r){return r.json();}).then(function(j){if(j.error)throw new Error(j.error.message);var t='';try{t=j.candidates[0].content.parts.map(function(p){return p.text||'';}).join('');}catch(e){}return t||'[빈 응답]';});}).catch(function(e){return '[자동 생성 실패] '+((e&&e.message)||e);});}
function render(){var box=document.getElementById('list');var ks=Object.keys(items);document.getElementById('empty').style.display=ks.length?'none':'block';box.innerHTML='';ks.slice().reverse().forEach(function(key){var it=items[key];var el=document.createElement('div');el.className='aq'+(it.status==='answered'?' done':'');el.innerHTML='<div class="qn" style="color:#ffd23f">'+esc(it.nick||'익명')+(it.status==='answered'?'<span class="badge">송출됨</span>':'')+'</div><div class="qt">'+esc(it.text)+'</div>'+(it.status==='answered'?'<div class="qt" style="color:#27e0b0;margin-top:8px">🤖 '+esc(it.answer||'')+'</div>':'<textarea id="ta_'+key+'">'+esc(it.draft||'초안 생성 중…')+'</textarea><div class="row"><button class="send">✅ 송출</button><button class="regen">🔄 재생성</button></div>');box.appendChild(el);if(it.status!=='answered'){var ta=el.querySelector('textarea');el.querySelector('.send').onclick=function(){var t=ta.value.trim();if(!t)return;db.ref('questions/'+key).update({answer:t,status:'answered',ats:Date.now()});};el.querySelector('.regen').onclick=function(){ta.value='초안 생성 중…';draft(it.text).then(function(d){it.draft=d;ta.value=d;});};}});}
var lt=Date.now()-120000;db.ref('questions').limitToLast(50).on('child_added',function(s){var v=s.val()||{};if(v.ts&&v.ts<lt)return;var key=s.key;items[key]={nick:v.nick,text:v.text,status:v.status,answer:v.answer,draft:''};render();if(v.status!=='answered'){draft(v.text||'').then(function(d){if(items[key]){items[key].draft=d;var ta=document.getElementById('ta_'+key);if(ta&&(ta.value===''||ta.value==='초안 생성 중…'))ta.value=d;}});}});
db.ref('questions').on('child_changed',function(s){var v=s.val()||{};if(items[s.key]){items[s.key]=Object.assign(items[s.key],v);render();}});
